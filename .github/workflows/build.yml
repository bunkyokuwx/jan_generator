name: Build macOS App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pillow fonttools pyinstaller
          
      - name: Build with PyInstaller
        # 注意: 
        # 1. -w でコンソール非表示、-n でアプリ名指定
        # 2. --add-data の区切り文字は macOS なのでコロン (:)
        # 3. ファイル名の大文字・小文字は厳密に一致させること
        run: |
          pyinstaller -w -n "JANコード作成ツール_mac_V1.0" --icon "JAN_ICON.icns" --add-data "OCRB.TTF:." JANcode-V35.py
          
      - name: Zip app bundle
        run: |
          cd dist
          ls -l  # 打印出 dist 目录下的所有文件，方便我们在日志里查看它的真面目
          zip -r JANCodeTool_mac.zip .  # 注意最后有个点，代表打包当前目录下的所有内容
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App
          path: dist/JANCodeTool_mac.zip
