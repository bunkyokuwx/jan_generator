name: Build macOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pillow fonttools pyinstaller
          
      - name: Build with PyInstaller
        # 出力名を JANCodeTool_mac_V1.0 に指定
        run: |
          pyinstaller -w -n "JANCodeTool_mac_V1.0" --icon "JAN_ICON.icns" --add-data "OCRB.TTF:." JANcode-V35.py
          
      - name: Zip app bundle
        # 圧縮後のファイル名も JANCodeTool_mac_V1.0.zip に統一
        run: |
          cd dist
          ls -l
          zip -r JANCodeTool_mac_V1.0.zip .
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App-V1.0
          path: dist/JANCodeTool_mac_V1.0.zip
